kind = "web"
previewPath = "/"
title = "مافيوسو — لعبة الاستنتاج الاجتماعي"
version = "1.0.0"
id = "artifacts/mafioso"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 18155

[services.development]
run = "pnpm --filter @workspace/mafioso run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/mafioso", "run", "build" ]
publicDir = "artifacts/mafioso/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "18155"
BASE_PATH = "/"
